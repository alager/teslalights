[env:seeed-xiao-afruitnrf52-nrf52840]
platform = Seeed Studio
board = seeed-xiao-mbed-nrf52840
framework = arduino
monitor_speed = 115200

lib_deps = 
	arduino-libraries/ArduinoBLE@^2.0.1
	adafruit/Adafruit NeoPixel@^1.15.4
